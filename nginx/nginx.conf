###############################################################################
# Nginx configuration for Geo-Location Based Attendance System
#
# Responsibilities
# ────────────────
#  - Rate limiting (10 req/s per IP, burst 20)
#  - Gzip compression for JSON / text responses
#  - Reverse proxy for the FastAPI API  (/api/)
#  - WebSocket upgrade proxy            (/ws/)
#  - MinIO pass-through                 (/minio/)
###############################################################################

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
    use                epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging format ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;           # hide Nginx version

    # ── Upload limit ──────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/plain
        text/css
        text/xml
        text/javascript
        image/svg+xml
        application/xml
        application/xml+rss;

    # ── Rate limiting ─────────────────────────────────────────────────────
    # Zone:  10 requests/second per client IP
    # Burst: 20 queued requests before returning 429
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # ── Upstream: FastAPI (uvicorn) ───────────────────────────────────────
    upstream api {
        server api:8000;
        keepalive 32;
    }

    # ── Upstream: MinIO ───────────────────────────────────────────────────
    upstream minio {
        server minio:9000;
        keepalive 8;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Main server block
    # ─────────────────────────────────────────────────────────────────────
    server {
        listen      80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"            always;
        add_header X-Content-Type-Options "nosniff"               always;
        add_header X-XSS-Protection       "1; mode=block"         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Health check (for load-balancer / uptime monitors) ────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── REST API (/api/) ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Buffer settings
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ── WebSocket endpoints (/ws/) ────────────────────────────────────
        location /ws/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;

            # WebSocket upgrade headers — REQUIRED
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "Upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long timeout for persistent connections
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # Disable buffering for streaming
            proxy_buffering    off;
        }

        # ── MinIO object storage (/minio/) ────────────────────────────────
        location /minio/ {
            # Strip the /minio prefix before forwarding to MinIO
            rewrite ^/minio/(.*) /$1 break;

            proxy_pass         http://minio;
            proxy_http_version 1.1;

            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # MinIO needs these for virtual-hosted bucket URLs
            proxy_set_header   X-Forwarded-Host  $host;

            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;  # allow large uploads
            proxy_send_timeout    300s;

            # Required for MinIO presigned URL compatibility
            proxy_buffering       off;
            proxy_request_buffering off;
        }

        # ── Catch-all 404 ─────────────────────────────────────────────────
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }

        # ── Error pages ───────────────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"error":"too many requests","retry_after":1}';
            add_header Content-Type application/json;
            add_header Retry-After 1;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 502 '{"error":"upstream unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
