# Alembic configuration file
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migrations directory (relative to this file's location)
script_location = migrations

# Template used to generate migration file names.
# Default: %%(rev)s_%%(slug)s
# Use a timestamp prefix so files sort chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepend – useful when alembic is run from the repo root
prepend_sys_path = .

# Truncate long revision slugs to keep file names manageable
truncate_slug_length = 40

# Revision environment
timezone = UTC

# Maximum length of characters to apply to the slug field
# (default: None means no limit)
# truncate_slug_length = 40

# Version locations – single linear chain for this project
# version_locations = %(here)s/migrations/versions

# The SQLAlchemy connection URL.
# We read it from the environment at runtime inside env.py; this placeholder
# is overridden there, but Alembic needs the key to exist in this section.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/geo_attendance

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
